    @keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
    .install-bar .msg { flex: 1; color: #e8e8e8; font-size: 13px; direction: rtl; font-family: 'Noto Sans Arabic', sans-serif; }
    .install-bar .msg strong { color: #4CAF50; display: block; margin-bottom: 2px; font-size: 14px; }

    const manifestBlob = new Blob([JSON.stringify({
  "name": "حاسبة استحقاقات - نفط الشمال",
  "short_name": "نفط الشمال",
  "description": "حاسبة استحقاقات شركة نفط الشمال",
  "start_url": "./",
  "display": "standalone",
  "background_color": "#0d0d0d",
  "theme_color": "#4CAF50",
  "orientation": "portrait",
  "lang": "ar",
  "dir": "rtl",
  "icons": [
    {
      "src": "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='32' fill='%234CAF50'/%3E%3Ctext x='96' y='130' text-anchor='middle' font-size='100' fill='white'%3E%F0%9F%8F%9B%3C/text%3E%3C/svg%3E",
      "sizes": "192x192",
      "type": "image/svg+xml"
    },
    {
      "src": "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='80' fill='%234CAF50'/%3E%3Ctext x='256' y='360' text-anchor='middle' font-size='280' fill='white'%3E%F0%9F%8F%9B%3C/text%3E%3C/svg%3E",
      "sizes": "512x512",
      "type": "image/svg+xml"
    }
  ]
})], {type: 'application/json'});
    const manifestUrl = URL.createObjectURL(manifestBlob);
    const manifestLink = document.createElement('link');
    manifestLink.rel = 'manifest';
    manifestLink.href = manifestUrl;
    document.head.appendChild(manifestLink);
  </script>
</head>

<div id="android-guide" style="display:none;position:fixed;top:0;left:0;right:0;z-index:99999;background:linear-gradient(135deg,#1a3a1a,#0a2a0a);border-bottom:2px solid #4CAF50;padding:14px 16px;font-family:'Noto Sans Arabic',sans-serif;direction:rtl;">

    <strong style="color:#4CAF50;font-size:15px;">📲 تثبيت التطبيق على أندرويد</strong>

  if (/android/i.test(navigator.userAgent) && window.matchMedia && !window.matchMedia('(display-mode: standalone)').matches) {
    setTimeout(() => { document.getElementById('android-guide').style.display = 'block'; }, 2000);
  }

<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const GRADES = {
  1:{name:"الأولى"},2:{name:"الثانية"},3:{name:"الثالثة"},4:{name:"الرابعة"},
  5:{name:"الخامسة"},6:{name:"السادسة"},7:{name:"السابعة"},8:{name:"الثامنة"},
  9:{name:"التاسعة"},10:{name:"العاشرة"},
};
const SALARY_SCALE = {
  1:[910,930,950,970,990,1010,1030,1050,1070,1090,1110],
  2:[723,740,757,774,791,808,825,842,859,876,893],
  3:[600,610,620,630,640,650,660,670,680,690,700],
  4:[490,500,510,520,530,540,550,560,570,580,590],
  5:[429,435,441,447,453,459,465,471,477,483,489],
  6:[362,368,374,380,386,392,398,404,410,416,422],
  7:[296,302,308,314,320,326,332,338,344,350,356],
  8:[260,263,266,269,272,275,278,281,284,287,290],
  9:[210,213,216,219,222,225,228,231,234,237,240],
  10:[170,173,176,179,182,185,188,191,194,197,200],
};
const ANNUAL_RAISE = {1:20,2:17.5,3:10,4:8,5:6,6:6,7:6,8:4,9:4,10:4};
const CERT_ALLOWANCES = {doctorate:100,masters:75,high_diploma:55,bachelor:45,diploma:35,preparatory:25};
const DANGER_RATES = {high:30,medium:26};
const STAGE_DAYS = {1:1825,2:1825,3:1825,4:1825,5:1825,6:1460,7:1460,8:1460,9:1460,10:1460};
const getStageDays = (grade) => STAGE_DAYS[grade] || 1460;
const DEFAULT_TYPES = [
  {id:"pm",      label:"شكر وتقدير رئيس الوزراء", daysReduction:180, color:"#FFD700", icon:"🏅"},
  {id:"minister",label:"شكر وتقدير وزير",          daysReduction:90,  color:"#C0C0C0", icon:"🥇"},
  {id:"company", label:"شكر وتقدير شركة أو جهة أخرى",          daysReduction:30,  color:"#CD7F32", icon:"🥈"},
];
const STORAGE_KEY = "noc_payroll_data";
function loadSaved() {
  try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : null; }
  catch { return null; }
}

function App() {
  const saved = loadSaved();
  const [tab, setTab] = useState("service");
  const [savedIndicator, setSavedIndicator] = useState(false);
  const [form, setForm] = useState(saved?.form || {
    name:"",employeeId:"",birthDate:"",hireDate:"",
    currentDate:new Date().toISOString().split("T")[0],
    grade:"7",stage:"1",certificate:"bachelor",dangerLevel:"medium",
    position:"normal",maritalStatus:"single",children:"0",workLocation:"60",
    lastPromotionDate:"",
    educationLevel:"3",productionRole:"3",quarterlyEval:"3",leadershipLevel:"0",serviceYears:"3",
  });
  const [commTypes, setCommTypes] = useState(saved?.commTypes || DEFAULT_TYPES.map(t=>({...t})));
  const [commendations, setCommendations] = useState(saved?.commendations || []);
  const [result, setResult] = useState(null);

  const update = (k,v) => setForm(f=>({...f,[k]:v}));

  useEffect(() => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ form, commTypes, commendations }));
      setSavedIndicator(true);
      const t = setTimeout(() => setSavedIndicator(false), 1500);
      return () => clearTimeout(t);
    } catch {}
  }, [form, commTypes, commendations]);

  const clearData = () => {
    if (!window.confirm("هل تريد مسح جميع البيانات المحفوظة؟")) return;
    localStorage.removeItem(STORAGE_KEY);
    setForm({ name:"",employeeId:"",birthDate:"",hireDate:"", currentDate:new Date().toISOString().split("T")[0],
      grade:"7",stage:"1",certificate:"bachelor",dangerLevel:"medium",
      position:"normal",maritalStatus:"single",children:"0",workLocation:"60",lastPromotionDate:"",
      educationLevel:"3",productionRole:"3",quarterlyEval:"3",leadershipLevel:"0",serviceYears:"3", });
    setCommTypes(DEFAULT_TYPES.map(t=>({...t})));
    setCommendations([]);
  };

  const updateType = (id,k,v) =>
    setCommTypes(ts=>ts.map(t=> t.id===id ? {...t,[k]: k==="daysReduction"? (parseInt(v)||0) : v} : t));
  const resetTypes = () => setCommTypes(DEFAULT_TYPES.map(t=>({...t})));
  const addCommendation = () =>
    setCommendations(c=>[...c,{id:Date.now(),type:commTypes[0].id,customDays:null,date:"",note:""}]);
  const removeCommendation = id => setCommendations(c=>c.filter(x=>x.id!==id));
  const updateCommendation = (id,k,v) =>
    setCommendations(c=>c.map(x=> x.id===id ? {...x,[k]:v} : x));
  const getEffectiveDays = (c) => {
    if (c.customDays !== null && c.customDays !== "") return parseInt(c.customDays)||0;
    const t = commTypes.find(x=>x.id===c.type);
    return t ? t.daysReduction : 0;
  };
  const calcReduction = () => commendations.reduce((s,c)=>s+getEffectiveDays(c),0);

  const calculate = () => {
    const {hireDate,currentDate,grade,stage,certificate,dangerLevel,position,maritalStatus,children,workLocation,lastPromotionDate}=form;
    if(!hireDate) return;
    const totalDays  = Math.floor((new Date(currentDate)-new Date(hireDate))/86400000);
    const duration   = fmtDur(totalDays);
    const totalYears = totalDays/365;
    const stageNum   = parseInt(stage), gradeNum=parseInt(grade);
    const BASE = getStageDays(gradeNum);
    const reductionDays = calcReduction();
    const hDate = new Date(hireDate);
    const today = new Date(currentDate);
    const stageStart = lastPromotionDate
      ? new Date(lastPromotionDate)
      : (() => { const d = new Date(hDate); d.setFullYear(hDate.getFullYear()+(stageNum-1)*2); return d; })();
    const daysFromStageStart = Math.max(0, Math.ceil((today - stageStart) / 86400000));
    const daysRemainingOrig  = Math.max(0, BASE - daysFromStageStart);
    const daysRemainingEff   = Math.max(0, daysRemainingOrig - reductionDays);
    const overdueOrig = daysRemainingOrig===0 ? Math.max(0, Math.ceil((today - stageStart) / 86400000) - BASE) : 0;
    const overdueEff  = daysRemainingEff===0  ? Math.max(0, Math.ceil((today - stageStart) / 86400000) - (BASE - reductionDays)) : 0;
    const nextStageDateOriginal  = new Date(today); nextStageDateOriginal.setDate(today.getDate()+daysRemainingOrig);
    const nextStageDateEffective = new Date(today); nextStageDateEffective.setDate(today.getDate()+daysRemainingEff);
    const daysToNext     = daysRemainingEff;
    const daysToNextOrig = daysRemainingOrig;
    const nextStageDuration = fmtDur(Math.max(0,daysToNext));
    const nextStageNum = Math.min(stageNum+1,11);
    const annualRaise  = ANNUAL_RAISE[gradeNum]*1000;
    const baseSalary   = (SALARY_SCALE[gradeNum]?.[stageNum-1]||0)*1000;
    const certAllowance   = Math.round(baseSalary*(CERT_ALLOWANCES[certificate]||0)/100);
    const specialAllowance = Math.round(baseSalary*0.30);
    const dangerAllowance = Math.round(baseSalary*DANGER_RATES[dangerLevel]/100);
    let positionAllowance=0;
    if(position==="deputy_dg")      positionAllowance=Math.round(baseSalary*0.30);
    else if(position==="board_director") positionAllowance=Math.round(baseSalary*0.25);
    else if(position==="dept_director")  positionAllowance=Math.round(baseSalary*0.20);
    else if(position==="section_chief")  positionAllowance=Math.round(baseSalary*0.15);
    const maritalAllowance  = maritalStatus==="married"?50000:0;
    const childrenAllowance = Math.min(parseInt(children),4)*10000;
    const locationAllowance = parseInt(workLocation)*1000;
    const totalAllowances   = certAllowance+specialAllowance+dangerAllowance+positionAllowance+maritalAllowance+childrenAllowance+locationAllowance;
    const retirementDed=Math.round(baseSalary*0.10),supportFundDed=1000,orphansDed=1000;
    const stampDed=Math.round(2000000/12),socialDed=Math.round(baseSalary*0.00205);
    const netBT=baseSalary+locationAllowance-retirementDed;
    let taxAmount=0;
    if(netBT>83333){
      if(netBT<=166666) taxAmount=Math.round((netBT-83333)*0.03+83333*0.03);
      else if(netBT<=333333) taxAmount=Math.round((netBT-166666)*0.05+166666*0.03);
      else taxAmount=Math.round((netBT-333333)*0.10+333333*0.08);
    }
    const totalDeductions=retirementDed+supportFundDed+orphansDed+stampDed+socialDed+taxAmount;
    const netSalary=baseSalary+totalAllowances-totalDeductions;
    const commByType={};
    commTypes.forEach(t=>{commByType[t.id]=commendations.filter(c=>c.type===t.id).length;});
    const effectiveDays = daysRemainingEff;
    const incEdu  = parseFloat(form.educationLevel||0);
    const incProd = parseFloat(form.productionRole||0);
    const incEval = parseFloat(form.quarterlyEval||0);
    const incLead = parseFloat(form.leadershipLevel||0);
    const incServ = Math.min(Math.floor(parseInt(form.serviceYears||0)/5), 2);
    const incTotal= Math.min(incEdu+incProd+incEval+incLead+incServ,20);
    const incentiveAmount = Math.round(baseSalary * incTotal / 100);
    setResult({
      duration,totalDays,totalYears,
      nextStageDateOriginal,nextStageDateEffective,nextStageDuration,
      nextStageNum,daysToNext,daysToNextOrig,reductionDays,effectiveDays,commByType,overdueOrig,overdueEff,
      baseSalary,annualRaise,
      allowances:{cert:certAllowance,special:specialAllowance,danger:dangerAllowance,position:positionAllowance,
        marital:maritalAllowance,children:childrenAllowance,location:locationAllowance},
      totalAllowances,
      deductions:{retirement:retirementDed,support:supportFundDed,orphans:orphansDed,
        stamp:stampDed,social:socialDed,tax:taxAmount},
      totalDeductions,netSalary,
      incentive:{edu:incEdu,prod:incProd,eval:incEval,lead:incLead,serv:incServ,total:incTotal,amount:incentiveAmount},
    });
  };

  useEffect(()=>{calculate();},[form,commendations,commTypes]);

  const fmt    = n=>(n??0).toLocaleString("en-US");

  const fmtDur = days=>{const d=Math.max(0,days);return{years:Math.floor(d/365),months:Math.floor((d%365)/30),days:d%30,total:d};};
  const fmtDate= d=>d instanceof Date&&!isNaN(d)?d.toLocaleDateString("en-GB",{year:"numeric",month:"2-digit",day:"2-digit"}):"—";
  const fmtDateStr= s=>s?fmtDate(new Date(s)):"—";

  const TABS=[
    {id:"service",   label:"الخدمة",              icon:"⏱"},
    {id:"commend",   label:"الشكر والتقدير",       icon:"🎖"},
    {id:"retire",    label:"تاريخ التقاعد",        icon:"🎓"},
    {id:"salary",    label:"شهادة شكر وتقدير",     icon:"📜"},
    {id:"ration",    label:"إيقاف البطاقة التموينية", icon:"🛒"},
  ];

  return (
    <div style={S.root}>
      <div style={S.statusBar}>
        <span style={{fontSize:12,color:"#aaa"}}>شركة نفط الشمال</span>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {savedIndicator && <span style={{fontSize:11,color:"#4CAF50"}}>💾 تم الحفظ</span>}
          <button onClick={clearData} style={{background:"none",border:"1px solid #333",borderRadius:6,color:"#666",fontSize:10,padding:"2px 8px",cursor:"pointer"}}>مسح البيانات</button>
          <span style={{fontSize:12,color:"#4CAF50"}}>● متصل</span>
        </div>
      </div>

      <div style={S.header}>
        <div style={S.headerGrad}/>
        <div style={{...S.headerContent,flexDirection:"column",alignItems:"center",textAlign:"center"}}>
          <div style={{fontSize:34}}>🏛</div>
          <div>
            <div style={{...S.appTitle,fontSize:18}}>حاسبة استحقاقات</div>
            <div style={S.appSubtitle}>من اعداد المهندس — محمد محي الدين عمر الجباري</div>
          </div>
        </div>
      </div>

      <div style={S.card}>
        <div style={S.sectionTitle}><span>👤</span> بيانات الموظف</div>
        <Row>
          <F label="الاسم"><input style={S.input} value={form.name} onChange={e=>update("name",e.target.value)} placeholder="الاسم الثلاثي"/></F>
          <F label="رقم الشركة"><input style={S.input} value={form.employeeId} onChange={e=>update("employeeId",e.target.value)} placeholder="الرقم التعريفي"/></F>
        </Row>
        <Row>
          <F label="تاريخ الولادة"><input style={{...S.input,textAlign:"center"}} type="date" value={form.birthDate} onChange={e=>update("birthDate",e.target.value)}/></F>
          <F label="تاريخ التعيين"><input style={{...S.input,textAlign:"center"}} type="date" value={form.hireDate} onChange={e=>update("hireDate",e.target.value)}/></F>
        </Row>
        <Row>
          <F label="التاريخ الحالي"><input style={{...S.input,textAlign:"center"}} type="date" value={form.currentDate} onChange={e=>update("currentDate",e.target.value)}/></F>
          <F label="تاريخ آخر ترفيع"><input style={{...S.input,textAlign:"center"}} type="date" value={form.lastPromotionDate} onChange={e=>update("lastPromotionDate",e.target.value)}/></F>
        </Row>
        <Row>
          <F label="الدرجة الوظيفية">
            <select style={S.input} value={form.grade} onChange={e=>update("grade",e.target.value)}>
              {Object.entries(GRADES).map(([k,v])=><option key={k} value={k}>الدرجة {v.name}</option>)}
            </select>
          </F>
          <F label="المرحلة (الراتبة)">
            <select style={S.input} value={form.stage} onChange={e=>update("stage",e.target.value)}>
              {Array.from({length:11},(_,i)=>i+1).map(s=><option key={s} value={s}>المرحلة {s}</option>)}
            </select>
          </F>
        </Row>
        <Row>
          <F label="الشهادة">
            <select style={S.input} value={form.certificate} onChange={e=>update("certificate",e.target.value)}>
              <option value="doctorate">دكتوراه (100%)</option>
              <option value="masters">ماجستير (75%)</option>
              <option value="high_diploma">دبلوم عالي (55%)</option>
              <option value="bachelor">بكالوريوس (45%)</option>
              <option value="diploma">دبلوم (35%)</option>
              <option value="preparatory">إعدادية (25%)</option>
            </select>
          </F>
          <F label="درجة الخطورة">
            <select style={S.input} value={form.dangerLevel} onChange={e=>update("dangerLevel",e.target.value)}>
              <option value="high">عالية (30%)</option>
              <option value="medium">متوسطة (26%)</option>
            </select>
          </F>
        </Row>
        <Row>
          <F label="المنصب الإداري">
            <select style={S.input} value={form.position} onChange={e=>update("position",e.target.value)}>
              <option value="normal">موظف عادي</option>
              <option value="section_chief">رئيس شعبة (15%)</option>
              <option value="dept_director">مدير قسم (20%)</option>
              <option value="board_director">مدير هيأة (25%)</option>
              <option value="deputy_dg">معاون مدير عام (30%)</option>
            </select>
          </F>
          <F label="موقع العمل">
            <select style={S.input} value={form.workLocation} onChange={e=>update("workLocation",e.target.value)}>
              <option value="60">60,000 د.ع</option>
              <option value="40">40,000 د.ع</option>
            </select>
          </F>
        </Row>
        <Row>
          <F label="الحالة الزوجية">
            <select style={S.input} value={form.maritalStatus} onChange={e=>update("maritalStatus",e.target.value)}>
              <option value="single">أعزب / مطلق / أرمل</option>
              <option value="married">متزوج</option>
            </select>
          </F>
          <F label="عدد الأطفال (حتى 4)">
            <select style={S.input} value={form.children} onChange={e=>update("children",e.target.value)}>
              {[0,1,2,3,4].map(n=><option key={n} value={n}>{n} أطفال</option>)}
            </select>
          </F>
        </Row>
      </div>

      <div style={S.tabBar}>
        {TABS.map(t=>(
          <button key={t.id} style={{...S.tabBtn,...(tab===t.id?S.tabActive:{})}} onClick={()=>setTab(t.id)}>
            <span style={{fontSize:15}}>{t.icon}</span>
            <span style={{fontSize:9}}>{t.label}</span>
          </button>
        ))}
      </div>

      <div style={S.tabContent}>

        {tab==="service"&&result&&(
          <div>
            <div style={S.bigCard}>
              <div style={S.bigCardLabel}>مدة الخدمة الفعلية</div>
              <div style={S.bigCardValue}>
                {(result.duration.days)}<span style={S.unit}> يوم </span>
                {(result.duration.months)}<span style={S.unit}> شهر </span>
                {(result.duration.years)}<span style={S.unit}> سنة</span>
              </div>
              <div style={S.bigCardSub}>{fmt(result.totalDays)} يوم إجمالي</div>
            </div>
            <div style={S.infoRow}>
              <div style={S.infoBox}><div style={S.infoLabel}>تاريخ التعيين</div><div style={S.infoValue}>{fmtDateStr(form.hireDate)}</div></div>

<script>
// PWA Install Prompt
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  setTimeout(showInstallBanner, 4000);
});
function showInstallBanner() {
  if (!deferredPrompt || document.querySelector('.install-bar')) return;
  const bar = document.createElement('div');
  bar.className = 'install-bar';
  bar.innerHTML = `
    <div class="msg"><strong>📲 تثبيت التطبيق</strong>ثبّت على هاتفك للاستخدام بدون إنترنت</div>
    <button class="ibtn" onclick="installPWA()">تثبيت</button>
    <button class="xbtn" onclick="this.closest('.install-bar').remove()">✕</button>
  `;
  document.body.appendChild(bar);
}
async function installPWA() {
  document.querySelector('.install-bar')?.remove();
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
}

// Service Worker
const SW_CODE = `
const CACHE='noc-v1';
const FILES=['/'];
self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll(FILES)));self.skipWaiting();});
self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));self.clients.claim();});
self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('/'))));});
`;

if ('serviceWorker' in navigator) {
  const blob = new Blob([SW_CODE], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}
</script>
